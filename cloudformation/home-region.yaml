AWSTemplateFormatVersion: "2010-09-09"
Description: >
  CraftForm home region setup template. Provisions the necessary resources for the home region before the actions are set up.

#====================================================================================================================
#                                                 PARAMETERS
#====================================================================================================================
# set of necessary parameters for the home region setup - comes from the user input during stack creation
#--------------------------------------------------------------------------------------------------------------------
Parameters:
  # where the home region will be set up
  HomeRegion:
    Type: String
    Description: The AWS region where the CraftForm home region will be set up (e.g., us-east-1).
    Default: us-east-1  # Default to us-east-1, but can be changed by the user during stack creation
    AllowedValues:  # creates a dropdown in the CloudFormation console with the allowed regions for easier selection and to prevent typos
      - us-east-1
      - us-east-2
      - us-west-1
      - us-west-2
      - ca-central-1
      - eu-west-1
      - eu-west-2
      - eu-west-3
      - eu-central-1
      - eu-north-1
      - eu-south-1
      - ap-southeast-1
      - ap-southeast-2
      - ap-northeast-1
      - ap-northeast-2
      - ap-northeast-3
      - ap-south-1
      - sa-east-1
      - af-south-1
      - me-south-1

  # discord parameters for the CraftForm bot
  DiscordAppId:
    Type: String
    Description: The Discord Application ID for the CraftForm bot.
    NoEcho: true  # Hide the value in the CloudFormation console for security
  DiscordPublicKey:
    Type: String
    Description: The Discord Public Key for verifying interactions from Discord.
    NoEcho: true  # Hide the value in the CloudFormation console for security
  DiscordBotToken:
    Type: String
    Description: The Discord Bot Token for authenticating the CraftForm bot with Discord.
    NoEcho: true  # Hide the value in the CloudFormation console for security

  # Github parameters for the GitHub integration and cloning from the GitHub repository
  GitHubPersonalAccessToken:
    Type: String
    Description: The GitHub Personal Access Token for authenticating with GitHub APIs.
    NoEcho: true  # Hide the value in the CloudFormation console for security
  GitHubUsername:
    Type: String
    Description: The GitHub Username associated with the Personal Access Token.


#====================================================================================================================
#                                                 RESOURCES
#====================================================================================================================
# set of necessary resources for the home region setup - develops the home region for discord and github integration, 
# and the necessary infrastructure for the CraftForm bot to operate in the home region
#--------------------------------------------------------------------------------------------------------------------

# -----------------------------------------OIDC PROVIDER-----------------------------------------
Resources:
  # OIDC PROVIDER - allows GitHub Actions to authenticate with AWS using OIDC tokens rather than secret access keys, which is more secure and eliminates the need to manage long-lived credentials for GitHub Actions in AWS. This OIDC provider will be used in the trust policy of the IAM role that GitHub Actions will assume when deploying to the home region.
  GithubOIDCProvider:
    Type: AWS::IAM::OIDCProvider 
    Properties:
      Url: "https://token.actions.githubusercontent.com"  # OIDC provider URL for GitHub Actions
      ClientIdList: # basically where GitHub Actions will be allowed to authenticate from
        - "sts.amazonaws.com" 
      ThumbprintList:
      # Thumbprint for token.actions.githubusercontent.com
        - "6938fd4d98bab03faadb97b34396831e3780aea1" 
        - "1c58a3a8518e8759bf075b76b750d4f2df264fcd"

  # ------------------------------------------IAM ROLES------------------------------------------
  # github actions role
  GithubActionsRole:
    Type: AWS::IAM::Role
    Properties: # configs for the IAM role that GitHub Actions will assume
      # tags
      Tags:
        - Key: "Project"
          Value: "craftForm"
        - Key: "Environment"
          Value: "HomeRegion"
      RoleName: "craftForm-github-actions"  # Name of the IAM role for GitHub Actions
      AssumeRolePolicyDocument:  # who is allowed to assume this role - GithubActions
        Version: "2012-10-17"
        Statement:  # list of statements in the trust policy
          - Effect: "Allow"
            Principal: # who is allowed to assume this role
              # reference the created OIDC provider for Github Actions - Get the ARN (can't use !Ref here)
              Federated: !GetAtt GithubOIDCProvider.Arn

            # allow assuming the role with web identity (OIDC token)
            Action: "sts:AssumeRoleWithWebIdentity"

            Condition:  # conditions for assuming the role
              StringEquals:
                # only accept token with this audience claim - that the token is meant for AWS STS
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                 # only accept tokens from this specific repo - where the token is coming from
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubUsername}/${GitHubRepo}:*"
      
      Policies:  # inline policies for the role - permissions that the role has
        - PolicyName: "craftForm-github-actions-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # allow creatiion
              - Effect: "Allow"
                Action:
                  - ec2:Create*
                  - ec2:RunInstances
                  - ec2:AllocateAddress
                  - s3:CreateBucket
                  - iam:CreateRole
                  - iam:CreatePolicy
                  - iam:CreateInstanceProfile
                  - iam:AttachRolePolicy
                  - iam:PassRole
                Resource: "*"

              # allow modification and desctruction of anything with specific craftForm tag
              - Effect: "Allow"
                Action:
                  - "*"  # all actions
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/craftForm": "true"  # only allow modification and deletion of resources tagged with craftForm=true

              # allow full access to specefic SSM parameter path for CraftForm
              - Effect: "Allow"
                Action:
                  - ssm:*
                Resource: !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/craftform/*"

              # allow full access to specific DynamoDB table for CraftForm
              - Effect: "Allow"
                Action:
                  - dynamodb:*
                Resource: !GetAtt TerraformLocksTable.Arn 

              # allow full access to specefic S3 for CraftForm
              - Effect: "Allow"
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  # bucket level permissions
                  - !GetAtt TerraformStateBucket.Arn
                  # object level permissions
                  - !Sub "${TerraformStateBucket.Arn}/*"

  # lambda minimal role - execution role
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      # tags
      Tags:
        - Key: "Project"
          Value: "craftForm"
        - Key: "Environment"
          Value: "HomeRegion"

      RoleName: "craftForm-lambda-execution"  # Name of the IAM role for Lambda execution
      AssumeRolePolicyDocument:  # who is allowed to assume this role - Lambda service
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Service: "lambda.amazonaws.com"  # only Lambda service to assume this role
            Action: "sts:AssumeRole"

      Policies:  # inline policies for the role - permissions that the Lambda functions will have when executing
        - PolicyName: "craftForm-lambda-execution-policy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # allow ssm read/write as well as secrete manager read
              - Effect: "Allow"
                Action:
                  - ssm:GetParameter
                  - ssm:PutParameter
                  - ssm:GetParametersByPath
                  - secretsmanager:GetSecretValue
                Resource: 
                  - !Sub "arn:aws:ssm:*:${AWS::AccountId}:parameter/craftform/*"  # allow access to SSM parameters under the craftform path
                  - !Sub "arn:aws:secretsmanager:*:${AWS::AccountId}:secret:craftform/*"

              # allow logging to CloudWatch Logs for Lambda functions - create log group, log stream, and put log events
              - Effect: "Allow"
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: "arn:aws:logs:*:*:*"

  # ------------------------------------------S3 STATE BUCKET------------------------------------------
  TerraformStateBucket:
    Type: AWS::S3::Bucket
    Properties:
      # globally unique name for the S3 bucket
      BucketName: !Sub "craftform-terraform-state-${AWS::AccountId}"
      Tags:
        - Key: "Project"
          Value: "craftForm"
        - Key: "Environment"
          Value: "HomeRegion"

      # enable versioning to keep track of changes to the Terraform state files
      VersioningConfiguration:
        Status: "Enabled"

      # block public access to the bucket for security
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true     # prevent public ACLs from being set on the bucket or objects within the bucket
        BlockPublicPolicy: true   # prevent public bucket policies from being applied to the bucket
        IgnorePublicAcls: true    # ignore any public ACLs
        RestrictPublicBuckets: true   # say no no to any public access to the bucket
      
  # ------------------------------------------DYNAMODB TABLES------------------------------------------
  TerraformLocksTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: "craftform-terraform-locks"
      Tags:
        - Key: "Project"
          Value: "craftForm"
        - Key: "Environment"
          Value: "HomeRegion"
      AttributeDefinitions:
        - AttributeName: "LockID"
          AttributeType: "S"  # string type for the lock ID
      KeySchema:
        - AttributeName: "LockID"
          KeyType: "HASH"  # partition key for the DynamoDB table
      BillingMode: "PAY_PER_REQUEST"  # on-demand billing mode for the DynamoDB table
  # -------------------------------------------SECRET MANGER-------------------------------------------
  # holds sensitive information like the Discord bot token and Github PAT, which are needed for the
  # craftForm bot to operate

  CraftFormSecrets:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: "craftform-secrets"
      Description: "Secrets for CraftForm application, including Discord and GitHub credentials."
      Tags:
        - Key: "Project"
          Value: "craftForm"
        - Key: "Environment"
          Value: "HomeRegion"

      SecretString: !Sub '{"DiscordBotToken": "${DiscordBotToken}", "GitHubPersonalAccessToken": "${GitHubPersonalAccessToken}"}'

  # -------------------------------------------SSM PARAMETERS------------------------------------------
  # HOME REGION PARAMETER
  HomeRegionParameter:
  Type: AWS::SSM::Parameter
  Properties:
    Name: "/craftform/config/home-region"
    Type: "String"
    Value: !Ref HomeRegion
    Description: "Home AWS region for CraftForm"
    Tags:
      Project: "craftForm"
      Environment: "HomeRegion"
# GITHUB PARAMETERS:
  GithubUsernameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/github/username"
      Type: "String"
      Value: !Ref GitHubUsername
      Description: "GitHub username for CraftForm integration"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"

# DISCORD PARAMETERS:
  DiscordAppIdParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/discord/app-id"
      Type: "String"
      Value: !Ref DiscordAppId
      Description: "Discord Application ID for CraftForm bot"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"
  DiscordPublicKeyParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/discord/public-key"
      Type: "String"
      Value: !Ref DiscordPublicKey
      Description: "Discord Public Key for CraftForm bot"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"

  # STATE FILE PARAMETERS:
  S3StateBucketParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/terraform/state-bucket"
      Type: "String"
      Value: !Ref TerraformStateBucket
      Description: "Name of the S3 bucket for Terraform state files"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"
  DynamoDBLocksTableParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/terraform/locks-table"
      Type: "String"
      Value: !Ref TerraformLocksTable
      Description: "Name of the DynamoDB table for Terraform locks"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"

  # API GATEWAY PARAMETER:
  APIGatewayEndpointParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/api-gateway/endpoint"
      Type: "String"
      Value: ""  # NEED TO UPDATE THIS VALUE WHEN API GATEWAY IS CREATED
      Description: "API Gateway endpoint URL for CraftForm bot interactions"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"

  # IAM ROLE PARAMETERS:  
  GithubActionsRoleArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/iam/github-actions-role-arn"
      Type: "String"
      Value: !GetAtt GithubActionsRole.Arn  # get the ARN of the GitHub Actions role
      Description: "ARN of the IAM role for GitHub Actions to assume when deploying to the home region"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"
  
  # SECRETS MANAGER PARAMETERS:
  CraftFormSecretsArnParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: "/craftform/config/secrets/arn"
      Type: "String"
      Value: !Ref CraftFormSecrets  # get the ARN of the Secrets Manager secret
      Description: "ARN of the Secrets Manager secret that holds CraftForm secrets"
      Tags:
        Project: "craftForm"
        Environment: "HomeRegion"

  # --------------------------------------------API GATEWAY--------------------------------------------

  # -----------------------------------------LAMBDA FUNCTIONS------------------------------------------

  # ------------------------------------------RESOURCE TRIGGER-----------------------------------------